services:
  - type: web
    name: yam-web
    runtime: docker
    autoDeploy: true
    plan: free
    healthCheckPath: /healthz
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 4321
      - key: DATABASE_URL
        fromDatabase:
          name: yam-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: ADMIN_USERNAME
        value: admin
      - key: ADMIN_EMAIL
        value: admin@yam.app
      - key: ADMIN_PASSWORD
        sync: false

databases:
  - name: yam-db
    plan: free
