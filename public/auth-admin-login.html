<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#241711" />
    <title>YAM · 管理员登录</title>
    <link rel="stylesheet" href="/styles.css" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="icon" type="image/png" sizes="192x192" href="/assets/icon/yam-icon-192.png" />
    <link rel="apple-touch-icon" href="/assets/icon/yam-apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="YAM" />
  </head>
  <body data-page="auth" data-auth-mode="admin-login">
    <main class="identity-shell">
      <section class="identity-stage">
        <div class="identity-background">
          <span class="aurora aurora-a"></span>
          <span class="aurora aurora-b"></span>
          <span class="aurora aurora-c"></span>
          <span class="identity-drape identity-drape-a"></span>
          <span class="identity-drape identity-drape-b"></span>
          <span class="identity-dot identity-dot-a"></span>
          <span class="identity-dot identity-dot-b"></span>
        </div>

        <a class="brand-inline identity-brand" href="/">
          <img class="brand-icon" src="/assets/icon/yam-icon-192.png" alt="YAM 图标" />
          <div>
            <strong>YAM</strong>
            <span>admin login</span>
          </div>
        </a>

        <div class="identity-stack identity-stack-auth">
          <section class="identity-card">
            <div class="identity-copy">
              <p id="auth-kicker" class="kicker">管理员登录</p>
              <h1 id="auth-title">进入总控后台。</h1>
              <p id="auth-quote" class="identity-quote"></p>
            </div>

            <div id="auth-message" class="status-banner" aria-live="polite"></div>

            <form id="auth-form" class="data-form identity-form">
              <label>
                <span>管理员用户名</span>
                <input name="identifier" type="text" autocomplete="username" placeholder="输入管理员用户名" required />
              </label>
              <label>
                <span>密码</span>
                <input name="password" type="password" autocomplete="current-password" placeholder="输入密码" required />
              </label>
              <button class="button primary auth-submit" type="submit">进入总控后台</button>
            </form>
          </section>
        </div>
      </section>
    </main>

    <script type="module" src="/auth.js"></script>
  </body>
</html>
